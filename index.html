<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #111827;
      color: #f3f4f6;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    h1, h2 {
      margin-top: 0;
    }

    .card {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #d1d5db;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #f9fafb;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      border: none;
      background: #2563eb;
      font-weight: bold;
    }

    button.secondary {
      background: #374151;
    }

    button:hover {
      opacity: 0.92;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
    }

    .muted {
      color: #9ca3af;
      font-size: 14px;
    }

    .success {
      color: #34d399;
      white-space: pre-wrap;
    }

    .error {
      color: #f87171;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    .small {
      font-size: 13px;
    }

    hr {
      border: none;
      border-top: 1px solid #374151;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Item Admin</h1>
    <p class="muted">Login, dann neue Items direkt in Supabase anlegen.</p>

    <div class="card">
      <h2>Supabase Verbindung</h2>
      <div class="grid">
        <div>
          <label for="supabaseUrl">Supabase URL</label>
          <input id="supabaseUrl" type="text" placeholder="https://xyzcompany.supabase.co" />
        </div>
        <div>
          <label for="supabaseAnonKey">Supabase Anon Key</label>
          <input id="supabaseAnonKey" type="text" placeholder="eyJhbGciOi..." />
        </div>
      </div>
      <p class="muted small">
        Diese Werte kannst du auch fest im Code hinterlegen, wenn du möchtest.
      </p>
    </div>

    <div id="loginCard" class="card">
      <h2>Login</h2>
      <div class="grid">
        <div>
          <label for="email">E-Mail</label>
          <input id="email" type="email" placeholder="dein-login@example.com" />
        </div>
        <div>
          <label for="password">Passwort</label>
          <input id="password" type="password" placeholder="Passwort" />
        </div>
      </div>
      <div class="row" style="margin-top: 14px;">
        <button id="loginBtn">Einloggen</button>
        <button id="checkSessionBtn" class="secondary" type="button">Session prüfen</button>
      </div>
      <div id="authMessage" class="muted" style="margin-top: 12px;"></div>
    </div>

    <div id="appCard" class="card hidden">
      <div class="row" style="align-items: center;">
        <div>
          <h2 style="margin-bottom: 6px;">Neues Item anlegen</h2>
          <div id="userInfo" class="muted"></div>
        </div>
        <div style="max-width: 180px;">
          <button id="logoutBtn" class="secondary" type="button">Logout</button>
        </div>
      </div>

      <hr />

      <form id="itemForm">
        <div class="grid">
          <div>
            <label for="item_code">item_code *</label>
            <input id="item_code" name="item_code" type="text" placeholder="z. B. sword_test_001" required />
          </div>

          <div>
            <label for="display_name">display_name *</label>
            <input id="display_name" name="display_name" type="text" placeholder="z. B. Testschwert" required />
          </div>

          <div>
            <label for="rarity">rarity</label>
            <select id="rarity" name="rarity">
              <option value="">-- leer lassen --</option>
              <option value="normal">normal</option>
              <option value="magic">magic</option>
              <option value="rare">rare</option>
              <option value="legendary">legendary</option>
            </select>
          </div>

          <div>
            <label for="item_type">item_type</label>
            <select id="item_type" name="item_type">
              <option value="">-- leer lassen --</option>
              <option value="sword_1h">sword_1h</option>
              <option value="axe_1h">axe_1h</option>
              <option value="helmet">helmet</option>
              <option value="amulet">amulet</option>
              <option value="ring">ring</option>
              <option value="shield">shield</option>
              <option value="crusader_shield">crusader_shield</option>
              <option value="orb">orb</option>
              <option value="quiver">quiver</option>
              <option value="book">book</option>
              <option value="belt">belt</option>
              <option value="boots">boots</option>
              <option value="gloves">gloves</option>
              <option value="pants">pants</option>
              <option value="bracer">bracer</option>
              <option value="chest_armor">chest_armor</option>
              <option value="cloak">cloak</option>
              <option value="shoulder_armor">shoulder_armor</option>
              <option value="artifact">artifact</option>
            </select>
          </div>

          <div>
            <label for="equip_slot">equip_slot</label>
            <select id="equip_slot" name="equip_slot">
              <option value="">-- leer lassen --</option>
              <option value="weapon_main">weapon_main</option>
              <option value="weapon_off">weapon_off</option>
              <option value="head">head</option>
              <option value="shoulders">shoulders</option>
              <option value="chest">chest</option>
              <option value="sleeve">sleeve</option>
              <option value="hand">hand</option>
              <option value="belt">belt</option>
              <option value="legs">legs</option>
              <option value="feet">feet</option>
              <option value="amulet">amulet</option>
              <option value="ring_left">ring_left</option>
              <option value="ring_right">ring_right</option>
              <option value="artifact">artifact</option>
              <option value="backpack">backpack</option>
            </select>
          </div>

          <div>
            <label for="tooltip_archetype">tooltip_archetype</label>
            <select id="tooltip_archetype" name="tooltip_archetype">
              <option value="">-- leer lassen --</option>
              <option value="weapon">weapon</option>
              <option value="armor">armor</option>
              <option value="jewelry">jewelry</option>
              <option value="offhand">offhand</option>
              <option value="artifact">artifact</option>
              <option value="consumable">consumable</option>
              <option value="material">material</option>
              <option value="quest">quest</option>
            </select>
          </div>

          <div>
            <label for="binding_mode">binding_mode</label>
            <select id="binding_mode" name="binding_mode">
              <option value="">-- leer lassen --</option>
              <option value="tradable">tradable</option>
              <option value="account_bound">account_bound</option>
              <option value="bind_on_equip">bind_on_equip</option>
              <option value="bind_on_pickup">bind_on_pickup</option>
            </select>
          </div>

          <div>
            <label for="rarity_label">rarity_label</label>
            <input id="rarity_label" name="rarity_label" type="text" placeholder="z. B. Legendäres Schwert" />
          </div>

          <div>
            <label for="level_requirement">level_requirement</label>
            <input id="level_requirement" name="level_requirement" type="number" min="1" />
          </div>

          <div>
            <label for="damage_min">damage_min</label>
            <input id="damage_min" name="damage_min" type="number" step="0.01" />
          </div>

          <div>
            <label for="damage_max">damage_max</label>
            <input id="damage_max" name="damage_max" type="number" step="0.01" />
          </div>

          <div>
            <label for="attacks_per_second">attacks_per_second</label>
            <input id="attacks_per_second" name="attacks_per_second" type="number" step="0.01" />
          </div>

          <div>
            <label for="armor_min">armor_min</label>
            <input id="armor_min" name="armor_min" type="number" step="0.01" />
          </div>

          <div>
            <label for="armor_max">armor_max</label>
            <input id="armor_max" name="armor_max" type="number" step="0.01" />
          </div>

          <div>
            <label for="random_primary_min">random_primary_min</label>
            <input id="random_primary_min" name="random_primary_min" type="number" min="0" />
          </div>

          <div>
            <label for="random_primary_max">random_primary_max</label>
            <input id="random_primary_max" name="random_primary_max" type="number" min="0" />
          </div>

          <div>
            <label for="random_secondary_min">random_secondary_min</label>
            <input id="random_secondary_min" name="random_secondary_min" type="number" min="0" />
          </div>

          <div>
            <label for="random_secondary_max">random_secondary_max</label>
            <input id="random_secondary_max" name="random_secondary_max" type="number" min="0" />
          </div>

          <div>
            <label for="crafted_tier">crafted_tier</label>
            <input id="crafted_tier" name="crafted_tier" type="number" min="1" />
          </div>

          <div>
            <label for="source_type">source_type</label>
            <input id="source_type" name="source_type" type="text" placeholder="z. B. crafted / drop / quest" />
          </div>

          <div>
            <label for="item_set_code">item_set_code</label>
            <input id="item_set_code" name="item_set_code" type="text" placeholder="optional" />
          </div>

          <div>
            <label for="is_unique_equipped">is_unique_equipped</label>
            <select id="is_unique_equipped" name="is_unique_equipped">
              <option value="">-- leer lassen --</option>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>

        <div style="margin-top: 16px;">
          <label for="description">description</label>
          <textarea id="description" name="description" placeholder="Optionaler Beschreibungstext"></textarea>
        </div>

        <div style="margin-top: 16px;">
          <label for="extra_data_json">extra_data_json</label>
          <textarea id="extra_data_json" name="extra_data_json" placeholder='Optional, z. B. {"my_key":"my_value"}'></textarea>
        </div>

        <div class="row" style="margin-top: 18px;">
          <button type="submit">Item speichern</button>
          <button type="button" id="resetBtn" class="secondary">Formular leeren</button>
        </div>
      </form>

      <div id="resultBox" style="margin-top: 18px;"></div>
    </div>
  </div>

  <script>
    let supabaseClient = null;

    function getSupabaseClient() {
      const url = document.getElementById("supabaseUrl").value.trim();
      const anonKey = document.getElementById("supabaseAnonKey").value.trim();

      if (!url || !anonKey) {
        throw new Error("Bitte Supabase URL und Anon Key eintragen.");
      }

      if (!supabaseClient) {
        supabaseClient = window.supabase.createClient(url, anonKey);
      }

      return supabaseClient;
    }

    function setMessage(targetId, text, type = "muted") {
      const el = document.getElementById(targetId);
      el.className = type;
      el.textContent = text;
    }

    function showApp(user) {
      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("appCard").classList.remove("hidden");
      document.getElementById("userInfo").textContent = `Eingeloggt als: ${user.email}`;
    }

    function showLogin() {
      document.getElementById("loginCard").classList.remove("hidden");
      document.getElementById("appCard").classList.add("hidden");
      document.getElementById("userInfo").textContent = "";
    }

    function parseValue(key, value) {
      if (value === "") return undefined;

      const intFields = [
        "level_requirement",
        "random_primary_min",
        "random_primary_max",
        "random_secondary_min",
        "random_secondary_max",
        "crafted_tier"
      ];

      const floatFields = [
        "damage_min",
        "damage_max",
        "attacks_per_second",
        "armor_min",
        "armor_max"
      ];

      if (intFields.includes(key)) {
        return Number.parseInt(value, 10);
      }

      if (floatFields.includes(key)) {
        return Number.parseFloat(value);
      }

      if (key === "is_unique_equipped") {
        if (value === "true") return true;
        if (value === "false") return false;
      }

      if (key === "extra_data_json") {
        return JSON.parse(value);
      }

      return value;
    }

    function buildPayload(form) {
      const formData = new FormData(form);
      const payload = {};

      for (const [key, value] of formData.entries()) {
        if (value === "") continue;

        if (key === "extra_data_json") {
          payload["extra_data"] = parseValue(key, value);
          continue;
        }

        payload[key] = parseValue(key, value);
      }

      return payload;
    }

    async function login() {
      try {
        const client = getSupabaseClient();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        const { data, error } = await client.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        setMessage("authMessage", "Login erfolgreich.", "success");
        showApp(data.user);
      } catch (err) {
        setMessage("authMessage", err.message || String(err), "error");
      }
    }

    async function checkSession() {
      try {
        const client = getSupabaseClient();
        const { data, error } = await client.auth.getUser();
        if (error) throw error;

        if (data.user) {
          setMessage("authMessage", "Session gefunden.", "success");
          showApp(data.user);
        } else {
          setMessage("authMessage", "Keine aktive Session gefunden.", "muted");
          showLogin();
        }
      } catch (err) {
        setMessage("authMessage", err.message || String(err), "error");
      }
    }

    async function logout() {
      try {
        const client = getSupabaseClient();
        const { error } = await client.auth.signOut();
        if (error) throw error;

        showLogin();
        document.getElementById("resultBox").innerHTML = "";
        setMessage("authMessage", "Ausgeloggt.", "muted");
      } catch (err) {
        document.getElementById("resultBox").innerHTML = `<div class="error">${err.message || String(err)}</div>`;
      }
    }

    async function saveItem(event) {
      event.preventDefault();

      const resultBox = document.getElementById("resultBox");
      resultBox.innerHTML = "";

      try {
        const client = getSupabaseClient();
        const form = document.getElementById("itemForm");
        const payload = buildPayload(form);

        if (!payload.item_code || !payload.display_name) {
          throw new Error("item_code und display_name sind Pflichtfelder.");
        }

        const { data, error } = await client
          .from("items")
          .insert([payload])
          .select();

        if (error) throw error;

        resultBox.innerHTML = `
          <div class="success">
Item erfolgreich gespeichert.

${JSON.stringify(data, null, 2)}
          </div>
        `;
      } catch (err) {
        resultBox.innerHTML = `<div class="error">${err.message || String(err)}</div>`;
      }
    }

    function resetForm() {
      document.getElementById("itemForm").reset();
      document.getElementById("resultBox").innerHTML = "";
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("checkSessionBtn").addEventListener("click", checkSession);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("itemForm").addEventListener("submit", saveItem);
    document.getElementById("resetBtn").addEventListener("click", resetForm);

    // optional direkt beim Laden prüfen
    // checkSession();
  </script>
</body>
</html>
